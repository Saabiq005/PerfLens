service:

  identity:

    id: inventory_service

    display_name: Inventory Service

    description: >
      Simulated microservice responsible for inventory lookup,
      stock validation and warehouse availability.

    domain: Inventory Management

  deployment:

    environment: development

    deployment_tag: release-1

    version: 1.0.0

  telemetry:

    enabled: true

    metrics:

      - latency

      - throughput

      - error_rate

      - trace_duration

  scenarios:

    supported:

      - healthy

      - traffic_spike

      - database_bottleneck

      - error_storm

      - recovery

    initial: healthy

  metadata:

    owner: Platform Engineering

    criticality: high

    sla: 99.95%

    tags:

      - inventory

      - warehouse

      - api