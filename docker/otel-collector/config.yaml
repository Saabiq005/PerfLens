receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317  # Change from 127.0.0.1 to 0.0.0.0
      http:
        endpoint: 0.0.0.0:4318  # Change from 127.0.0.1 to 0.0.0.0


processors:

  batch:


exporters:
  # Change this from logging:
  debug:
    verbosity: detailed  # Options: basic, normal, detailed


service:

  pipelines:

    metrics:

      receivers:

        - otlp

      processors:

        - batch

      exporters:

        - debug